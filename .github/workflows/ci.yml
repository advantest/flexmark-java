# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches-ignore:
    - master
    - main
  pull_request:
    branches:
    - develop
  workflow_dispatch:

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        os:  # see https://docs.github.com/en/actions/reference/runners/github-hosted-runners
        - ubuntu-latest
        - macos-26-intel
        - macos-latest # ARM
        - windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    
    steps:
    - name: Check out
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v5 # see https://github.com/actions/setup-java
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B clean verify --file pom.xml

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    #- name: Update dependency graph
    #  uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_name == 'develop'
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Check out
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Deploy to GitHub Maven Packages
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: mvn -B clean -Pdeploy-github -DskipTests deploy
